name: CI/CD - Combine JSON Files

on:
  push:
    branches:
      - main # Trigger on push to main branch

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v2

      # Notify Discord that the process has started
      - name: Send Deployment Discord Notification
        run: |
          curl -X POST ${{ secrets.DISCORD_WEBHOOK_URL }} \
          -H "Content-Type: application/json" \
          -d '{
                "embeds": [{
                  "title": "GitHub Actions Workflow Started",
                  "description": "A new deployment has started.",
                  "color": 3066993,
                  "fields": [
                    {
                      "name": "Repository",
                      "value": "'${{ github.repository }}'",
                      "inline": true
                    }
                  ],
                  "footer": {
                    "text": "GitHub Actions",
                    "icon_url": "https://github.githubassets.com/images/modules/logos_page/GitHub-Mark.png"
                  },
                  "timestamp": "'$(date --utc +%FT%TZ)'"
                }]
              }'

      # Pull latest changes from the remote main branch to avoid conflicts
      - name: Pull latest changes from remote
        run: |
          git fetch origin
          git merge origin/main --strategy=recursive --strategy-option=theirs

      - name: List files in data directory
        run: ls -al data/

      - name: Set up Python
        uses: actions/setup-python@v2
        with:
          python-version: "3.x"

      - name: Run combine_json.py
        run: python scripts/combine_json.py

      - name: Check if data.json exists
        run: |
          if [ -f data/data.json ]; then
            echo "data/data.json exists"
          else
            echo "data/data.json does not exist"
            exit 1
          fi

      - name: Commit combined data.json
        run: |
          git config --global user.name 'github-actions'
          git config --global user.email 'github-actions@github.com'

          # Stage the changes
          git add data/data.json

          # Check if there are any changes before committing
          if ! git diff --cached --quiet; then
            git commit -m "Update combined data.json"
            git remote set-url origin https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git
            git push
          else
            echo "No changes to commit."
          fi

      - name: Send Discord Notification
        if: always()
        run: |
          STATUS="${{ job.status }}"
          COLOR=3066993
          TITLE="GitHub Actions Workflow Succeeded"

          if [ "$STATUS" != "success" ]; then
            COLOR=15158332
            TITLE="GitHub Actions Workflow Failed"
          fi

          curl -X POST ${{ secrets.DISCORD_WEBHOOK_URL }} \
          -H "Content-Type: application/json" \
          -d "{
                \"embeds\": [{
                  \"title\": \"$TITLE\",
                  \"description\": \"The **combine_json.py** job has completed.\",
                  \"color\": $COLOR,
                  \"fields\": [
                    {
                      \"name\": \"Repository\",
                      \"value\": \"${{ github.repository }}\",
                      \"inline\": true
                    },
                    {
                      \"name\": \"Branch\",
                      \"value\": \"${{ github.ref_name }}\",
                      \"inline\": true
                    },
                    {
                      \"name\": \"Status\",
                      \"value\": \"$STATUS\",
                      \"inline\": false
                    }
                  ],
                  \"footer\": {
                    \"text\": \"GitHub Actions\",
                    \"icon_url\": \"https://github.githubassets.com/images/modules/logos_page/GitHub-Mark.png\"
                  },
                  \"timestamp\": \"$(date --utc +%FT%TZ)\"
                }]
              }"

      - name: Wait for GitHub Pages deployment
        run: |
          echo "Waiting for GitHub Pages to finish building..."
          for i in $(seq 1 30); do
            RESPONSE=$(curl -s \
              -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
              -H "Accept: application/vnd.github+json" \
              "https://api.github.com/repos/${{ github.repository }}/pages/builds/latest")
            BUILD_STATUS=$(echo "$RESPONSE" | python3 -c "import sys,json; print(json.load(sys.stdin).get('status','unknown'))")
            echo "Attempt $i: Pages build status = $BUILD_STATUS"
            if [ "$BUILD_STATUS" = "built" ] || [ "$BUILD_STATUS" = "errored" ]; then
              echo "PAGES_BUILD_STATUS=$BUILD_STATUS" >> $GITHUB_ENV
              break
            fi
            sleep 10
          done

      - name: Send Website Deployed Discord Notification
        run: |
          BUILD_STATUS="${{ env.PAGES_BUILD_STATUS }}"
          COLOR=3066993
          TITLE="Website Deployed Successfully"
          DESCRIPTION="**bz2stats.us** is live with the latest changes."

          if [ "$BUILD_STATUS" = "errored" ]; then
            COLOR=15158332
            TITLE="Website Deployment Failed"
            DESCRIPTION="The **bz2stats.us** GitHub Pages build has failed."
          fi

          curl -X POST ${{ secrets.DISCORD_WEBHOOK_URL }} \
          -H "Content-Type: application/json" \
          -d "{
                \"embeds\": [{
                  \"title\": \"$TITLE\",
                  \"description\": \"$DESCRIPTION\",
                  \"color\": $COLOR,
                  \"fields\": [
                    {
                      \"name\": \"Website\",
                      \"value\": \"https://bz2stats.us\",
                      \"inline\": true
                    },
                    {
                      \"name\": \"Pages Status\",
                      \"value\": \"$BUILD_STATUS\",
                      \"inline\": true
                    }
                  ],
                  \"footer\": {
                    \"text\": \"GitHub Pages\",
                    \"icon_url\": \"https://github.githubassets.com/images/modules/logos_page/GitHub-Mark.png\"
                  },
                  \"timestamp\": \"$(date --utc +%FT%TZ)\"
                }]
              }"
